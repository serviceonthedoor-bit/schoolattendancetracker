<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Attendance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen p-6">

<div class="max-w-7xl mx-auto bg-white rounded-2xl shadow-xl p-6">
    
    <!-- Header -->
    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-emerald-700">📋 Attendance Register</h1>
        <p class="text-gray-500">PM SHRI SHAHEED INDER GIRI GOVT HSS RAMPUR</p>
    </div>

    <!-- Controls -->
    <div class="flex flex-wrap gap-4 items-end mb-6">
        <div>
            <label class="block text-sm font-medium text-gray-700">Date</label>
            <input type="date" id="attendanceDate" class="border rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Head's Signature</label>
            <input type="text" id="headSignature" placeholder="Principal's name" class="border rounded-lg px-3 py-2 w-48">
        </div>
        <button onclick="checkRecords()" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
            <i class="fas fa-sync-alt mr-1"></i> Check Records
        </button>
        <button onclick="saveAll()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700">
            <i class="fas fa-save mr-1"></i> Save All
        </button>
    </div>

    <!-- Message -->
    <div id="message" class="mb-4 p-3 rounded-lg hidden"></div>

    <!-- Table -->
    <div class="overflow-x-auto">
        <table class="w-full text-sm border">
            <thead class="bg-emerald-700 text-white">
                <tr>
                    <th class="p-2 text-left">#</th>
                    <th class="p-2 text-left">Class</th>
                    <th class="p-2 text-left">Teacher</th>
                    <th class="p-2 text-center">Enrolled</th>
                    <th class="p-2 text-center">Present</th>
                    <th class="p-2 text-center">Absent</th>
                    <th class="p-2 text-center">%</th>
                    <th class="p-2 text-left">Signature</th>
                    <th class="p-2 text-center">Status</th>
                    <th class="p-2 text-center">Action</th>
                </tr>
            </thead>
            <tbody id="attendanceBody">
                <!-- Generated by JS -->
            </tbody>
        </table>
    </div>

    <!-- Summary -->
    <div class="grid grid-cols-5 gap-4 mt-6 text-center">
        <div class="bg-blue-50 p-3 rounded-lg"><p class="text-xs text-gray-500">Enrolled</p><p id="totalEnrolled" class="text-xl font-bold">0</p></div>
        <div class="bg-green-50 p-3 rounded-lg"><p class="text-xs text-gray-500">Present</p><p id="totalPresent" class="text-xl font-bold">0</p></div>
        <div class="bg-red-50 p-3 rounded-lg"><p class="text-xs text-gray-500">Absent</p><p id="totalAbsent" class="text-xl font-bold">0</p></div>
        <div class="bg-purple-50 p-3 rounded-lg"><p class="text-xs text-gray-500">Percentage</p><p id="totalPercentage" class="text-xl font-bold">0%</p></div>
        <div class="bg-yellow-50 p-3 rounded-lg"><p class="text-xs text-gray-500">Recorded</p><p id="classesRecorded" class="text-xl font-bold">0</p></div>
    </div>
</div>

<script>
// ========== CONFIG ==========
const SHEETS_URL = 'https://corsproxy.io/?https://script.google.com/macros/s/AKfycbzplxtZ459ozGCUGOZbeG-lMStksxgrK85Y2bC5uK1i2SRAMPE1xxF6t7OaNp21tstYGg/exec';

const classData = [
    'Nursery','LKG','UKG','Class I','Class II','Class III','Class IV',
    'Class V','Class VI','Class VII','Class VIII','Class IX','Class X','Class XI','Class XII'
];

// ========== BUILD TABLE ==========
const tbody = document.getElementById('attendanceBody');

classData.forEach((cls, i) => {
    const tr = document.createElement('tr');
    tr.className = 'border-b hover:bg-gray-50';
    tr.dataset.class = cls;
    tr.innerHTML = `
        <td class="p-2 text-center">${i+1}</td>
        <td class="p-2 font-medium">${cls}</td>
        <td class="p-2"><input class="teacher w-24 border rounded px-1 py-0.5 text-sm" placeholder="Teacher"></td>
        <td class="p-2 text-center"><input class="enrolled w-12 border rounded px-1 py-0.5 text-sm text-center" value="40" onchange="calcRow(this)"></td>
        <td class="p-2 text-center"><input class="present w-12 border rounded px-1 py-0.5 text-sm text-center text-green-600" value="0" oninput="calcRow(this)"></td>
        <td class="p-2 text-center"><input class="absent w-12 border rounded px-1 py-0.5 text-sm text-center text-red-500" readonly></td>
        <td class="p-2 text-center font-bold percentage text-blue-600">0%</td>
        <td class="p-2"><input class="signature w-24 border rounded px-1 py-0.5 text-sm" placeholder="Signature"></td>
        <td class="p-2 text-center"><span class="badge px-2 py-0.5 rounded-full text-xs bg-yellow-500 text-white">⏳ Pending</span></td>
        <td class="p-2 text-center"><button onclick="saveRow(this)" class="save-btn bg-emerald-600 text-white px-3 py-0.5 rounded-full text-xs hover:bg-emerald-700"><i class="fas fa-save mr-1"></i>Save</button></td>
    `;
    tbody.appendChild(tr);
});

// ========== FUNCTIONS ==========
function calcRow(input) {
    const row = input.closest('tr');
    const enrolled = parseInt(row.querySelector('.enrolled').value) || 0;
    const present = parseInt(row.querySelector('.present').value) || 0;
    const absent = Math.max(0, enrolled - present);
    const pct = enrolled > 0 ? Math.round((present/enrolled)*100) : 0;
    
    row.querySelector('.absent').value = absent;
    row.querySelector('.percentage').textContent = pct + '%';
    updateSummary();
}

function updateSummary() {
    let totalEnrolled = 0, totalPresent = 0, totalAbsent = 0, recorded = 0;
    document.querySelectorAll('#attendanceBody tr.frozen').forEach(row => {
        const e = parseInt(row.querySelector('.enrolled').value) || 0;
        const p = parseInt(row.querySelector('.present').value) || 0;
        if (e > 0) recorded++;
        totalEnrolled += e;
        totalPresent += p;
        totalAbsent += (e - p);
    });
    document.getElementById('totalEnrolled').textContent = totalEnrolled;
    document.getElementById('totalPresent').textContent = totalPresent;
    document.getElementById('totalAbsent').textContent = totalAbsent;
    document.getElementById('classesRecorded').textContent = recorded;
    document.getElementById('totalPercentage').textContent = 
        totalEnrolled > 0 ? Math.round((totalPresent/totalEnrolled)*100) + '%' : '0%';
}

function showMsg(text, type = 'info') {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = `mb-4 p-3 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-700' : type === 'error' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}`;
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 5000);
}

// ========== CHECK RECORDS ==========
async function checkRecords() {
    const date = document.getElementById('attendanceDate').value;
    if (!date) { showMsg('Please select a date', 'error'); return; }
    
    showMsg('⏳ Checking...', 'info');
    
    try {
        const res = await fetch(`${SHEETS_URL}?date=${date}`);
        if (!res.ok) throw new Error('Server error');
        const data = await res.json();
        
        // Reset all rows
        document.querySelectorAll('#attendanceBody tr').forEach(row => {
            row.classList.remove('frozen');
            row.querySelectorAll('input').forEach(inp => inp.disabled = false);
            row.querySelector('.badge').textContent = '⏳ Pending';
            row.querySelector('.badge').className = 'badge px-2 py-0.5 rounded-full text-xs bg-yellow-500 text-white';
            row.querySelector('.save-btn').disabled = false;
            row.querySelector('.save-btn').innerHTML = '<i class="fas fa-save mr-1"></i>Save';
        });
        
        if (data && data.length > 0) {
            data.forEach(entry => {
                const row = document.querySelector(`#attendanceBody tr[data-class="${entry.Class}"]`);
                if (row) {
                    row.classList.add('frozen');
                    row.querySelectorAll('input').forEach(inp => inp.disabled = true);
                    row.querySelector('.badge').textContent = '✅ Saved';
                    row.querySelector('.badge').className = 'badge px-2 py-0.5 rounded-full text-xs bg-green-500 text-white';
                    row.querySelector('.save-btn').disabled = true;
                    row.querySelector('.save-btn').innerHTML = '<i class="fas fa-check mr-1"></i>Done';
                }
            });
            showMsg(`✅ Found ${data.length} records`, 'success');
        } else {
            showMsg('📝 No records found for this date', 'info');
        }
        updateSummary();
        
    } catch(e) {
        showMsg('❌ Error: ' + e.message, 'error');
    }
}

// ========== SAVE ROW ==========
async function saveRow(btn) {
    const row = btn.closest('tr');
    if (row.classList.contains('frozen')) {
        showMsg('⚠️ Already saved', 'error');
        return;
    }
    
    const date = document.getElementById('attendanceDate').value;
    if (!date) { showMsg('Select a date first', 'error'); return; }
    
    const cls = row.dataset.class;
    const teacher = row.querySelector('.teacher').value || '';
    const enrolled = parseInt(row.querySelector('.enrolled').value) || 0;
    const present = parseInt(row.querySelector('.present').value) || 0;
    const absent = parseInt(row.querySelector('.absent').value) || 0;
    const pct = row.querySelector('.percentage').textContent;
    const sig = row.querySelector('.signature').value || '';
    const headSig = document.getElementById('headSignature').value || '';
    
    if (enrolled === 0) { showMsg('Enrolled cannot be 0', 'error'); return; }
    
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>';
    
    try {
        const res = await fetch(SHEETS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                school: 'PM SHRI SHAHEED INDER GIRI GOVT HSS RAMPUR',
                date: date,
                headSignature: headSig,
                class: cls,
                classTeacher: teacher,
                enrolled: enrolled,
                present: present,
                absent: absent,
                percentage: pct,
                teacherSignature: sig,
                timestamp: new Date().toISOString()
            })
        });
        
        const result = await res.text();
        if (result.includes('Success')) {
            row.classList.add('frozen');
            row.querySelectorAll('input').forEach(inp => inp.disabled = true);
            row.querySelector('.badge').textContent = '✅ Saved';
            row.querySelector('.badge').className = 'badge px-2 py-0.5 rounded-full text-xs bg-green-500 text-white';
            btn.innerHTML = '<i class="fas fa-check mr-1"></i>Done';
            btn.disabled = true;
            showMsg(`✅ ${cls} saved!`, 'success');
            updateSummary();
        } else {
            throw new Error(result);
        }
    } catch(e) {
        showMsg('❌ Error: ' + e.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save mr-1"></i>Save';
    }
}

// ========== SAVE ALL ==========
async function saveAll() {
    const btns = document.querySelectorAll('#attendanceBody tr:not(.frozen) .save-btn');
    if (btns.length === 0) {
        showMsg('No pending classes to save', 'info');
        return;
    }
    for (const btn of btns) {
        await saveRow(btn);
        await new Promise(r => setTimeout(r, 500));
    }
    showMsg(`✅ All ${btns.length} classes saved!`, 'success');
}

// ========== INIT ==========
document.getElementById('attendanceDate').value = new Date().toISOString().split('T')[0];
document.getElementById('attendanceDate').addEventListener('change', checkRecords);
</script>

</body>
</html>
